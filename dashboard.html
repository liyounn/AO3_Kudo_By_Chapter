<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chapter Kudos — Writer Dashboard</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;1,400&family=Courier+Prime&display=swap');

    :root {
      --ink: #2c1810;
      --parchment: #fdf6ec;
      --parchment-dark: #f5e6d0;
      --red: #8b2020;
      --red-light: #c0392b;
      --gold: #8b6914;
      --muted: #7a5c4a;
      --border: #c8a882;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--parchment);
      color: var(--ink);
      font-family: 'EB Garamond', Georgia, serif;
      min-height: 100vh;
      padding: 2rem 1rem 4rem;
    }

    .container { max-width: 740px; margin: 0 auto; }

    header {
      text-align: center;
      padding: 2rem 0 2.5rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 2.5rem;
    }

    .logo {
      font-size: 2rem;
      color: var(--red);
      letter-spacing: 0.04em;
      margin-bottom: 0.3rem;
    }

    .tagline {
      font-style: italic;
      color: var(--muted);
      font-size: 1rem;
    }

    .login-card {
      max-width: 420px;
      margin: 3rem auto;
      padding: 2rem;
      background: white;
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: 0 2px 16px rgba(44,24,16,0.08);
    }

    .login-card h2 {
      font-size: 1.2rem;
      margin-bottom: 1.4rem;
      color: var(--ink);
    }

    .field { margin-bottom: 1rem; }

    .field label {
      display: block;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 0.35rem;
    }

    .field input {
      width: 100%;
      padding: 0.55rem 0.8rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-family: 'Courier Prime', monospace;
      font-size: 0.95rem;
      background: var(--parchment);
      color: var(--ink);
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .field input:focus {
      outline: none;
      border-color: var(--red);
      box-shadow: 0 0 0 3px rgba(139,32,32,0.12);
    }

    .btn {
      width: 100%;
      padding: 0.65rem;
      background: var(--red);
      color: white;
      border: none;
      border-radius: 6px;
      font-family: 'EB Garamond', serif;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-top: 0.5rem;
    }

    .btn:hover { background: var(--red-light); transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }

    .error-msg {
      color: var(--red);
      font-size: 0.88rem;
      font-style: italic;
      margin-top: 0.8rem;
      text-align: center;
      min-height: 1.2em;
    }

    #dashboard { display: none; }

    .work-header { margin-bottom: 2rem; }

    .work-id {
      font-family: 'Courier Prime', monospace;
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 0.3rem;
    }

    .work-title {
      font-size: 1.6rem;
      color: var(--ink);
    }

    .total-badge {
      display: inline-block;
      margin-top: 0.5rem;
      padding: 0.25rem 0.9rem;
      background: var(--parchment-dark);
      border: 1px solid var(--border);
      border-radius: 99px;
      font-size: 0.85rem;
      color: var(--gold);
      font-style: italic;
    }

    .chart-section {
      background: white;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.6rem 1.6rem 1rem;
      margin-bottom: 2rem;
      box-shadow: 0 1px 8px rgba(44,24,16,0.05);
    }

    .section-title {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--gold);
      margin-bottom: 1.4rem;
    }

    .chart {
      display: flex;
      align-items: flex-end;
      gap: 6px;
      height: 160px;
      padding-bottom: 28px;
      position: relative;
    }

    .chart-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      gap: 4px;
      height: 100%;
      position: relative;
    }

    .chart-bar {
      width: 100%;
      background: var(--red);
      border-radius: 3px 3px 0 0;
      opacity: 0.8;
      transition: opacity 0.2s, transform 0.2s;
      min-height: 3px;
      position: relative;
      cursor: default;
    }

    .chart-bar:hover { opacity: 1; }

    .chart-bar-tooltip {
      display: none;
      position: absolute;
      bottom: calc(100% + 6px);
      left: 50%;
      transform: translateX(-50%);
      background: var(--ink);
      color: var(--parchment);
      font-size: 0.72rem;
      padding: 3px 8px;
      border-radius: 4px;
      white-space: nowrap;
      pointer-events: none;
      font-family: 'Courier Prime', monospace;
    }

    .chart-bar:hover .chart-bar-tooltip { display: block; }

    .chart-label {
      position: absolute;
      bottom: 0;
      font-size: 0.68rem;
      color: var(--muted);
      font-family: 'Courier Prime', monospace;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
      text-align: center;
    }

    .table-section {
      background: white;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 1px 8px rgba(44,24,16,0.05);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.92rem;
    }

    thead tr { background: var(--parchment-dark); }

    th {
      padding: 0.7rem 1rem;
      text-align: left;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      font-weight: normal;
      border-bottom: 1px solid var(--border);
    }

    td {
      padding: 0.65rem 1rem;
      border-bottom: 1px solid #f0e0cc;
      font-family: 'Courier Prime', monospace;
      font-size: 0.88rem;
    }

    tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: var(--parchment); }

    .drop-indicator {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 6px;
    }

    .drop-ok   { background: #27ae60; }
    .drop-warn { background: #f39c12; }
    .drop-bad  { background: var(--red); }

    .export-btn {
      float: right;
      font-family: 'Courier Prime', monospace;
      font-size: 0.75rem;
      padding: 0.25rem 0.7rem;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--muted);
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
    }
    .export-btn:hover { color: var(--ink); border-color: var(--gold); }

    .history-section {
      background: white;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.6rem 1.6rem 1rem;
      margin-top: 2rem;
      box-shadow: 0 1px 8px rgba(44,24,16,0.05);
    }

    .history-chart {
      display: flex;
      align-items: flex-end;
      gap: 3px;
      height: 80px;
      padding-bottom: 22px;
      position: relative;
      overflow-x: auto;
    }

    .history-col {
      flex: 0 0 auto;
      min-width: 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      gap: 3px;
      height: 100%;
      position: relative;
    }

    .history-bar {
      width: 100%;
      background: var(--gold);
      border-radius: 2px 2px 0 0;
      opacity: 0.75;
      min-height: 2px;
      transition: opacity 0.15s;
      position: relative;
      cursor: default;
    }
    .history-bar:hover { opacity: 1; }

    .history-bar-tooltip {
      display: none;
      position: absolute;
      bottom: calc(100% + 5px);
      left: 50%;
      transform: translateX(-50%);
      background: var(--ink);
      color: var(--parchment);
      font-size: 0.68rem;
      padding: 2px 6px;
      border-radius: 3px;
      white-space: nowrap;
      pointer-events: none;
      font-family: 'Courier Prime', monospace;
    }
    .history-bar:hover .history-bar-tooltip { display: block; }

    .history-label {
      position: absolute;
      bottom: 0;
      font-size: 0.6rem;
      color: var(--muted);
      font-family: 'Courier Prime', monospace;
      white-space: nowrap;
      text-align: center;
    }

    .history-empty {
      font-style: italic;
      color: var(--muted);
      font-size: 0.88rem;
      padding: 1rem 0;
    }

    .loading {
      text-align: center;
      padding: 3rem;
      color: var(--muted);
      font-style: italic;
    }

    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--red);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 0.5rem;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    footer {
      text-align: center;
      margin-top: 3rem;
      font-size: 0.78rem;
      color: var(--muted);
      font-style: italic;
    }

    footer a { color: var(--gold); }
  </style>
</head>
<body>
<div class="container">

  <header>
    <div class="logo">♥ Chapter Kudos</div>
    <div class="tagline">Writer Dashboard</div>
  </header>

  <div id="login">
    <div class="login-card">
      <h2>Access your dashboard</h2>
      <div class="field">
        <label>Work ID</label>
        <input type="text" id="input-work-id" placeholder="e.g. 12345678" inputmode="numeric"/>
      </div>
      <div class="field">
        <label>Secret Key</label>
        <input type="password" id="input-secret" placeholder="your WRITER_SECRET value"/>
      </div>
      <button class="btn" id="btn-load">View Dashboard</button>
      <div class="error-msg" id="error-msg"></div>
    </div>
  </div>

  <div id="dashboard">
    <div class="work-header">
      <div class="work-id" id="dash-work-id"></div>
      <div class="work-title">Chapter Kudos Overview</div>
      <span class="total-badge" id="dash-total"></span>
    </div>

    <div id="dash-loading" class="loading">
      <span class="spinner"></span> Loading kudos data…
    </div>

    <div id="dash-content" style="display:none">
      <div class="chart-section">
        <div class="section-title">Kudos per Chapter</div>
        <div class="chart" id="dash-chart"></div>
      </div>

      <div class="table-section">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Chapter ID</th>
              <th>Kudos</th>
              <th>Drop-off from prev.
                <button class="export-btn" id="btn-export" title="Download CSV">⬇ CSV</button>
              </th>
            </tr>
          </thead>
          <tbody id="dash-table"></tbody>
        </table>
      </div>

      <div class="history-section" id="history-section" style="display:none">
        <div class="section-title">Votes Over Time <span id="history-range" style="font-style:italic;font-weight:normal;text-transform:none;letter-spacing:0;color:var(--muted);font-size:0.75rem;"></span></div>
        <div class="history-chart" id="history-chart"></div>
      </div>
    </div>
  </div>

  <footer>
    <a href="https://github.com/YOUR_USERNAME/ao3-chapter-kudos" target="_blank">
      ao3-chapter-kudos
    </a>
    — open source, self-hosted, reader-owned
  </footer>

</div>

<script>
  const $ = id => document.getElementById(id);

  let workerBase = window.location.origin;
  let currentData = null;

  $('btn-load').addEventListener('click', loadDashboard);
  [$('input-work-id'), $('input-secret')].forEach(el =>
    el.addEventListener('keydown', e => e.key === 'Enter' && loadDashboard())
  );

  async function loadDashboard() {
    const workId = $('input-work-id').value.trim();
    const secret = $('input-secret').value.trim();
    $('error-msg').textContent = '';

    if (!workId || !/^\d+$/.test(workId)) {
      $('error-msg').textContent = 'Please enter a valid numeric Work ID.';
      return;
    }
    if (!secret) {
      $('error-msg').textContent = 'Please enter your secret key.';
      return;
    }

    $('btn-load').disabled = true;
    $('btn-load').textContent = 'Loading…';

    try {
      const keyParam = encodeURIComponent(secret);
      const [mainRes, histRes] = await Promise.all([
        fetch(`${workerBase}/dashboard/${workId}?key=${keyParam}`),
        fetch(`${workerBase}/dashboard/${workId}/history?key=${keyParam}`),
      ]);

      if (mainRes.status === 401) {
        $('error-msg').textContent = 'Incorrect secret key.';
        return;
      }
      if (!mainRes.ok) throw new Error('Server error');

      const data    = await mainRes.json();
      const history = histRes.ok ? await histRes.json() : null;
      currentData   = data;
      renderDashboard(workId, data, history);
    } catch (e) {
      $('error-msg').textContent = 'Could not connect to your worker. Check the URL.';
    } finally {
      $('btn-load').disabled = false;
      $('btn-load').textContent = 'View Dashboard';
    }
  }

  $('btn-export').addEventListener('click', () => {
    if (!currentData) return;
    const rows = [['Chapter', 'Chapter ID', 'Kudos', 'Drop-off from prev.']];
    currentData.chapters.forEach((ch, i) => {
      const prev = i > 0 ? currentData.chapters[i - 1].count : null;
      const drop = prev !== null && prev > 0
        ? `${Math.round(((ch.count - prev) / prev) * 100)}%`
        : '—';
      rows.push([i + 1, ch.chapterId, ch.count, drop]);
    });
    const csv  = rows.map(r => r.join(',')).join('\n');
    const blob = new Blob([csv], { type: 'text/csv' });
    const url  = URL.createObjectURL(blob);
    const a    = Object.assign(document.createElement('a'), {
      href: url, download: `chapter-kudos-${currentData.workId}.csv`,
    });
    a.click();
    URL.revokeObjectURL(url);
  });

  function renderDashboard(workId, data, history) {
    $('login').style.display = 'none';
    $('dashboard').style.display = 'block';
    $('dash-loading').style.display = 'none';
    $('dash-content').style.display = 'block';

    $('dash-work-id').textContent = `Work ID: ${workId}`;
    $('dash-total').textContent = `${data.total} total chapter kudos`;

    const chapters = data.chapters;
    const max = Math.max(...chapters.map(c => c.count), 1);

    const chart = $('dash-chart');
    chart.innerHTML = '';
    chapters.forEach((ch, i) => {
      const col = document.createElement('div');
      col.className = 'chart-col';

      const bar = document.createElement('div');
      bar.className = 'chart-bar';
      bar.style.height = `${Math.max((ch.count / max) * 132, 3)}px`;

      const tip = document.createElement('div');
      tip.className = 'chart-bar-tooltip';
      tip.textContent = `${ch.count} kudos`;
      bar.appendChild(tip);

      const lbl = document.createElement('div');
      lbl.className = 'chart-label';
      lbl.textContent = `Ch.${i + 1}`;

      col.appendChild(bar);
      col.appendChild(lbl);
      chart.appendChild(col);
    });

    const tbody = $('dash-table');
    tbody.innerHTML = '';
    chapters.forEach((ch, i) => {
      const prev = i > 0 ? chapters[i - 1].count : null;
      const drop = prev !== null && prev > 0
        ? Math.round(((ch.count - prev) / prev) * 100)
        : null;

      let dotClass = 'drop-ok';
      const dropText = i === 0 ? '—' : `${drop > 0 ? '+' : ''}${drop}%`;
      if (drop !== null && drop < -30) dotClass = 'drop-bad';
      else if (drop !== null && drop < -10) dotClass = 'drop-warn';

      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${i + 1}</td>
        <td>${ch.chapterId}</td>
        <td>${ch.count}</td>
        <td>
          ${drop !== null
            ? `<span class="drop-indicator ${dotClass}"></span>${dropText}`
            : '—'}
        </td>
      `;
      tbody.appendChild(tr);
    });

    if (history && history.daily && history.daily.length > 0) {
      renderHistory(history.daily);
    }
  }

  function renderHistory(daily) {
    $('history-section').style.display = 'block';

    const maxCount = Math.max(...daily.map(d => d.count), 1);
    const first    = daily[0].date;
    const last     = daily[daily.length - 1].date;
    $('history-range').textContent = daily.length > 1 ? `${first} – ${last}` : first;

    const container = $('history-chart');
    container.innerHTML = '';

    daily.forEach(({ date, count }) => {
      const col = document.createElement('div');
      col.className = 'history-col';

      const bar = document.createElement('div');
      bar.className = 'history-bar';
      bar.style.height = `${Math.max((count / maxCount) * 58, 2)}px`;

      const tip = document.createElement('div');
      tip.className = 'history-bar-tooltip';
      tip.textContent = `${date}: ${count}`;
      bar.appendChild(tip);

      const idx = daily.indexOf(daily.find(d => d.date === date));
      if (idx % 7 === 0 || idx === daily.length - 1) {
        const lbl = document.createElement('div');
        lbl.className = 'history-label';
        lbl.textContent = date.slice(5);
        col.appendChild(lbl);
      }

      col.appendChild(bar);
      container.appendChild(col);
    });
  }
</script>
</body>
</html>
